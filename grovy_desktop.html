<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grovy</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f4; --bg3: #efefed;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --info-bg: #e6f1fb; --info-text: #185fa5; --info-border: rgba(24,95,165,0.3);
    --success-bg: #eaf3de; --success-text: #3b6d11; --success-border: rgba(59,109,17,0.3);
    --danger-bg: #fcebeb; --danger-text: #a32d2d; --danger-border: rgba(163,45,45,0.3);
    --radius: 8px; --radius-lg: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px; color: var(--text); background: var(--bg);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e8e4; --text2: #a0a09c; --text3: #6b6b67;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #042c53; --info-text: #85b7eb; --info-border: rgba(133,183,235,0.3);
      --success-bg: #173404; --success-text: #97c459; --success-border: rgba(151,196,89,0.3);
      --danger-bg: #501313; --danger-text: #f09595; --danger-border: rgba(240,149,149,0.3);
    }
  }
  body { padding: 20px; min-width: 780px; }
  input, select, textarea, button {
    font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--bg); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 10px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--info-text); }
  button { cursor: pointer; padding: 7px 14px; }
  button:hover { background: var(--bg2); }
  button:active { transform: scale(0.98); }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .sync-label { font-size: 12px; color: var(--text2); display: flex; align-items: center; }
  .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .col { background: var(--bg2); border-radius: var(--radius-lg); padding: 12px 10px; min-height: 300px; }
  .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .col-title { font-size: 12px; font-weight: 500; color: var(--text2); }
  .col-count { font-size: 11px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 10px; padding: 1px 7px; color: var(--text2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 11px; margin-bottom: 7px; cursor: grab; }
  .card:hover { border-color: var(--border2); }
  .card-title { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; }
  .badge-high { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f09595; }
  .badge-medium { background: #faeeda; color: #854f0b; border: 0.5px solid #ef9f27; }
  .badge-low { background: #eaf3de; color: #3b6d11; border: 0.5px solid #97c459; }
  .badge-tag { background: var(--info-bg); color: var(--info-text); border: 0.5px solid var(--info-border); }
  .due { font-size: 11px; color: var(--text2); }
  .add-btn { width: 100%; margin-top: 4px; font-size: 12px; padding: 5px 0; background: transparent; border: 0.5px dashed var(--border2); border-radius: var(--radius); color: var(--text2); }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 10; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 24px; width: 380px; border: 0.5px solid var(--border); }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .field { margin-bottom: 10px; }
  .field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
  .field input, .field select, .field textarea { width: 100%; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  .row select, .row input { flex: 1; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .tag-pill { font-size: 11px; padding: 3px 9px; border-radius: 10px; cursor: pointer; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }
  .tag-pill.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .modal-actions button { flex: 1; min-width: 100px; font-size: 12px; }
  .modal-footer { display: flex; justify-content: space-between; }
  .btn-danger { color: var(--danger-text); border-color: var(--danger-border); }
  .btn-primary { background: var(--info-bg); color: var(--info-text); border-color: var(--info-border); }
  .toast { position: fixed; bottom: 20px; right: 20px; padding: 9px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; z-index: 20; }
  .toast.success { background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-border); }
  .toast.error { background: var(--danger-bg); color: var(--danger-text); border: 0.5px solid var(--danger-border); }
  .auth-wrap { max-width: 360px; margin: 60px auto; text-align: center; }
  .auth-wrap h1 { font-size: 28px; font-weight: 500; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
  .auth-form { text-align: left; }
  .auth-form label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; }
  .auth-form input { width: 100%; margin-bottom: 6px; }
  .auth-hint { font-size: 11px; color: var(--text3); margin-bottom: 16px; }
  .auth-btn { width: 100%; padding: 9px 0; font-size: 14px; }
  .auth-note { font-size: 12px; color: var(--text3); margin-top: 16px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const PRIORITIES = ["High", "Medium", "Low"];
const COLUMNS = ["To Do", "In Progress", "Done"];
const TAGS = ["Design", "Dev", "Research", "Meeting", "Bug", "Feature"];
const FOLDER_NAME = "Grovy";
const FILE_NAME = "grovy_tasks.json";

let state = {
  token: null, folderId: null, fileId: null,
  tasks: [
    { id: 1, title: "Set up project repo", priority: "High", due: "2026-04-30", tags: ["Dev"], col: "To Do", note: "" },
    { id: 2, title: "User interview prep", priority: "Medium", due: "2026-05-02", tags: ["Research","Meeting"], col: "In Progress", note: "" },
    { id: 3, title: "Fix login bug", priority: "High", due: "2026-04-28", tags: ["Bug","Dev"], col: "To Do", note: "" },
    { id: 4, title: "Design onboarding flow", priority: "Low", due: "2026-05-10", tags: ["Design"], col: "Done", note: "" },
  ],
  nextId: 5, syncStatus: "idle",
  modal: null, addCol: null,
  form: { title: "", priority: "Medium", due: "", tags: [], note: "" },
  sending: "", toast: null, dragId: null,
};

// ── Drive helpers ──
async function driveReq(path, opts = {}) {
  const r = await fetch(`https://www.googleapis.com${path}`, {
    ...opts, headers: { Authorization: `Bearer ${state.token}`, "Content-Type": "application/json", ...(opts.headers||{}) }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function ensureFolder() {
  const q = `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  const { files } = await driveReq(`/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
  if (files.length) return files[0].id;
  const f = await driveReq("/drive/v3/files", { method:"POST", body: JSON.stringify({ name: FOLDER_NAME, mimeType: "application/vnd.google-apps.folder" }) });
  return f.id;
}
async function findFile(folderId) {
  const q = `name='${FILE_NAME}' and '${folderId}' in parents and trashed=false`;
  const { files } = await driveReq(`/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`);
  return files[0]?.id || null;
}
async function readTasks(fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { Authorization: `Bearer ${state.token}` } });
  return r.json();
}
async function writeTasks() {
  const body = JSON.stringify(state.tasks);
  if (state.fileId) {
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${state.fileId}?uploadType=media`, {
      method: "PATCH", headers: { Authorization: `Bearer ${state.token}`, "Content-Type": "application/json" }, body
    });
  } else {
    const boundary = "grovyboundary";
    const meta = await fetch(`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`, {
      method: "POST",
      headers: { Authorization: `Bearer ${state.token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
      body: `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify({ name: FILE_NAME, parents: [state.folderId] })}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`
    });
    const d = await meta.json();
    state.fileId = d.id;
  }
}

async function initDrive() {
  setSyncStatus("syncing");
  try {
    state.folderId = await ensureFolder();
    const fid = await findFile(state.folderId);
    if (fid) {
      const data = await readTasks(fid);
      if (Array.isArray(data) && data.length) {
        state.tasks = data;
        state.nextId = Math.max(...data.map(t => t.id)) + 1;
      }
      state.fileId = fid;
    }
    setSyncStatus("saved");
    render();
  } catch { setSyncStatus("error"); showToast("Drive sync failed", "error"); }
}

async function saveToDrive() {
  if (!state.token || !state.folderId) return;
  setSyncStatus("syncing"); render();
  try { await writeTasks(); setSyncStatus("saved"); }
  catch { setSyncStatus("error"); }
  render();
}

// ── State helpers ──
function setSyncStatus(s) { state.syncStatus = s; }
function showToast(msg, type = "success") {
  state.toast = { msg, type }; render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}

// ── Auth ──
function startAuth() {
  const clientId = document.getElementById("client-id-input").value.trim();
  if (!clientId) return;
  const params = new URLSearchParams({
    client_id: clientId, redirect_uri: window.location.origin + window.location.pathname,
    response_type: "token", scope: "https://www.googleapis.com/auth/drive.file"
  });
  const popup = window.open(`https://accounts.google.com/o/oauth2/v2/auth?${params}`, "grovy_auth", "width=500,height=600");
  const iv = setInterval(() => {
    try {
      const hash = popup?.location?.hash;
      if (hash) {
        const p = new URLSearchParams(hash.slice(1));
        const token = p.get("access_token");
        if (token) { clearInterval(iv); popup.close(); state.token = token; render(); initDrive(); }
      }
    } catch {}
    if (popup?.closed) clearInterval(iv);
  }, 500);
}

// ── Task actions ──
function addTask() {
  const f = state.form;
  if (!f.title.trim()) return;
  state.tasks.push({ id: state.nextId++, col: state.addCol, ...JSON.parse(JSON.stringify(f)) });
  state.addCol = null;
  saveToDrive(); render();
}
function saveEditTask() {
  state.tasks = state.tasks.map(t => t.id === state.modal.id ? { ...state.modal } : t);
  saveTorive(); render();
}
function deleteTask(id) { state.tasks = state.tasks.filter(t => t.id !== id); state.modal = null; saveTorive(); render(); }
// typo fix aliases
function saveTorive() { saveToDrive(); }
function moveTask(id, col) { state.tasks = state.tasks.map(t => t.id === id ? { ...t, col } : t); saveToDrive(); render(); }
async function moveTaskAsync(id, col) { state.tasks = state.tasks.map(t => t.id === id ? { ...t, col } : t); await saveTorive(); render(); }

function toggleFormTag(tag) {
  const tags = state.form.tags;
  state.form.tags = tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag];
  render();
}
function toggleModalTag(tag) {
  const tags = state.modal.tags;
  state.modal.tags = tags.includes(tag) ? tags.filter(t => t !== tag) : [...tags, tag];
  render();
}

async function sendToJira(task) {
  state.sending = "jira"; render();
  try {
    await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 1000,
        system: "Use Atlassian MCP to create a Jira issue. Respond with a brief confirmation.",
        messages: [{ role: "user", content: `Create Jira issue: "${task.title}". Priority: ${task.priority}. Due: ${task.due||"not set"}. Tags: ${task.tags.join(", ")||"none"}. Note: ${task.note||"none"}.` }],
        mcp_servers: [{ type: "url", url: "https://mcp.atlassian.com/v1/mcp", name: "atlassian" }]
      })
    });
    showToast("Jira issue created");
  } catch { showToast("Jira failed", "error"); }
  state.sending = ""; render();
}

async function sendToEmail(task) {
  state.sending = "email"; render();
  try {
    await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 1000,
        system: "Use Gmail MCP to create a draft. Respond with a brief confirmation.",
        messages: [{ role: "user", content: `Draft email — Subject: "Task: ${task.title}". Body: Priority: ${task.priority}, Due: ${task.due||"not set"}, Tags: ${task.tags.join(", ")||"none"}, Note: ${task.note||"none"}.` }],
        mcp_servers: [{ type: "url", url: "https://gmailmcp.googleapis.com/mcp/v1", name: "gmail" }]
      })
    });
    showToast("Email draft created");
  } catch { showToast("Email failed", "error"); }
  state.sending = ""; render();
}

// ── Render ──
const syncDots = { idle:"#888", syncing:"#EF9F27", saved:"#1D9E75", error:"#E24B4A" };
const syncLabels = { idle:"Not connected", syncing:"Saving...", saved:"Synced to Drive", error:"Sync error" };

function badge(p) {
  const cls = { High:"badge-high", Medium:"badge-medium", Low:"badge-low" }[p];
  return `<span class="badge ${cls}">${p}</span>`;
}

function render() {
  const app = document.getElementById("app");
  if (!state.token) {
    app.innerHTML = `
      <div class="auth-wrap">
        <h1>Grovy</h1>
        <p class="auth-sub">Connect Google Drive to sync your tasks</p>
        <div class="auth-form">
          <label>Google OAuth Client ID</label>
          <input id="client-id-input" placeholder="Paste your Client ID here" />
          <p class="auth-hint">Get one free at console.cloud.google.com → APIs &amp; Services → Credentials</p>
        </div>
        <button class="auth-btn btn-primary" onclick="startAuth()">Sign in with Google</button>
        <p class="auth-note">Only accesses the Grovy folder in your Drive</p>
      </div>`;
    return;
  }

  const colTasks = col => state.tasks.filter(t => t.col === col);

  const boardHTML = COLUMNS.map(col => `
    <div class="col" ondragover="event.preventDefault()" ondrop="handleDrop('${col}')">
      <div class="col-header">
        <span class="col-title">${col}</span>
        <span class="col-count">${colTasks(col).length}</span>
      </div>
      ${colTasks(col).map(t => `
        <div class="card" draggable="true" ondragstart="state.dragId=${t.id}" onclick="openModal(${t.id})">
          <div class="card-title">${t.title}</div>
          <div class="badges">
            ${badge(t.priority)}
            ${t.tags.slice(0,2).map(tg => `<span class="badge badge-tag">${tg}</span>`).join("")}
            ${t.tags.length > 2 ? `<span style="font-size:10px;color:var(--text2)">+${t.tags.length-2}</span>` : ""}
          </div>
          ${t.due ? `<div class="due">Due ${t.due}</div>` : ""}
        </div>`).join("")}
      <button class="add-btn" onclick="openAddModal('${col}')">+ Add task</button>
    </div>`).join("");

  const addModalHTML = state.addCol ? `
    <div class="overlay" onclick="if(event.target===this)state.addCol=null,render()">
      <div class="modal">
        <h3>New task — ${state.addCol}</h3>
        <div class="field"><input id="f-title" placeholder="Task title" value="${state.form.title}" oninput="state.form.title=this.value" /></div>
        <div class="row">
          <select onchange="state.form.priority=this.value">${PRIORITIES.map(p=>`<option${p===state.form.priority?" selected":""}>${p}</option>`).join("")}</select>
          <input type="date" value="${state.form.due}" onchange="state.form.due=this.value" />
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Tags</div>
        <div class="tags-wrap">${TAGS.map(t=>`<span class="tag-pill${state.form.tags.includes(t)?" active":""}" onclick="toggleFormTag('${t}')">${t}</span>`).join("")}</div>
        <div class="field"><textarea rows="2" placeholder="Note (optional)" oninput="state.form.note=this.value" style="width:100%;resize:none">${state.form.note}</textarea></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="state.addCol=null;render()">Cancel</button>
          <button class="btn-primary" onclick="addTask()">Add task</button>
        </div>
      </div>
    </div>` : "";

  const editModalHTML = state.modal ? `
    <div class="overlay" onclick="if(event.target===this)state.modal=null,render()">
      <div class="modal">
        <h3>Edit task</h3>
        <div class="field"><input value="${state.modal.title}" oninput="state.modal.title=this.value;state.tasks=state.tasks.map(t=>t.id===state.modal.id?{...state.modal}:t);saveTorive()" style="width:100%" /></div>
        <div class="row">
          <select onchange="state.modal.priority=this.value;state.tasks=state.tasks.map(t=>t.id===state.modal.id?{...state.modal}:t);saveTorive()">${PRIORITIES.map(p=>`<option${p===state.modal.priority?" selected":""}>${p}</option>`).join("")}</select>
          <select onchange="state.modal.col=this.value;state.tasks=state.tasks.map(t=>t.id===state.modal.id?{...state.modal}:t);saveTorive()">${COLUMNS.map(c=>`<option${c===state.modal.col?" selected":""}>${c}</option>`).join("")}</select>
        </div>
        <input type="date" value="${state.modal.due}" onchange="state.modal.due=this.value;state.tasks=state.tasks.map(t=>t.id===state.modal.id?{...state.modal}:t);saveTorive()" style="width:100%;margin-bottom:10px" />
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">Tags</div>
        <div class="tags-wrap">${TAGS.map(t=>`<span class="tag-pill${state.modal.tags.includes(t)?" active":""}" onclick="toggleModalTag('${t}')">${t}</span>`).join("")}</div>
        <textarea rows="2" placeholder="Note (optional)" oninput="state.modal.note=this.value" style="width:100%;resize:none;margin-bottom:12px">${state.modal.note}</textarea>
        <div class="modal-actions">
          <button onclick="sendToJira(state.modal)" ${state.sending==="jira"?"disabled":""}>${state.sending==="jira"?"Sending...":"Send to Jira"}</button>
          <button onclick="sendToEmail(state.modal)" ${state.sending==="email"?"disabled":""}>${state.sending==="email"?"Sending...":"Email draft"}</button>
        </div>
        <div class="modal-footer">
          <button class="btn-danger" onclick="deleteTask(state.modal.id)">Delete</button>
          <button onclick="state.modal=null;render()">Close</button>
        </div>
      </div>
    </div>` : "";

  const toastHTML = state.toast ? `<div class="toast ${state.toast.type}">${state.toast.msg}</div>` : "";

  app.innerHTML = `
    <div class="header">
      <h1>Grovy</h1>
      <div class="sync-label">
        <span class="sync-dot" style="background:${syncDots[state.syncStatus]}"></span>
        ${syncLabels[state.syncStatus]}
      </div>
    </div>
    <div class="board">${boardHTML}</div>
    ${addModalHTML}${editModalHTML}${toastHTML}`;
}

function openAddModal(col) { state.addCol = col; state.form = { title:"", priority:"Medium", due:"", tags:[], note:"" }; render(); }
function openModal(id) { state.modal = JSON.parse(JSON.stringify(state.tasks.find(t => t.id === id))); render(); }
function handleDrop(col) { if (state.dragId) { state.tasks = state.tasks.map(t => t.id === state.dragId ? { ...t, col } : t); state.dragId = null; saveTorive(); render(); } }

render();
</script>
</body>
</html>
